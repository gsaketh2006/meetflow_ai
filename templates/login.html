<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MeetFlow AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="glass p-5 auth-card" style="width: 100%; max-width: 450px;">
        <div class="text-center mb-4">
            <a href="/" class="logo-text h2 mb-3 d-block">🚀 MeetFlow AI</a>
            <h4 class="fw-bold">Welcome Back</h4>
            <p class="text-secondary small">Sign in to manage your meeting action plans.</p>
        </div>

        <div id="error-alert" class="alert alert-danger d-none small mb-4"></div>

        <form id="login-form">
            <div class="mb-3">
                <label class="form-label text-secondary small">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text glass border-0 bg-transparent text-secondary"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="email" class="form-control glass border-0 text-white p-3" placeholder="name@company.com" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary small">Password</label>
                <div class="input-group">
                    <span class="input-group-text glass border-0 bg-transparent text-secondary"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" class="form-control glass border-0 text-white p-3" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" id="submit-btn" class="btn btn-primary w-100 py-3 rounded-pill fw-bold mb-3 shadow-lg">
                Sign In
            </button>
            <div class="text-center">
                <p class="small text-secondary mb-0">Don't have an account? <a href="/register" class="text-primary text-decoration-none fw-bold">Register</a></p>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submit-btn');
            const alert = document.getElementById('error-alert');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Authenticating...';
            alert.classList.add('d-none');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    alert.innerText = data.error;
                    alert.classList.remove('d-none');
                }
            } catch (err) {
                alert.innerText = "Connection error. Please try again.";
                alert.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.innerText = "Sign In";
            }
        });
    </script>
</body>
</html>
